apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracksphere-frontend
  labels:
    app: tracksphere-frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: tracksphere-frontend
  template:
    metadata:
      labels:
        app: tracksphere-frontend
    spec:
      # Hardened Security Context (Runs as non-root Nginx user)
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}

          # Request and Limit bounds for CPU/Memory
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
