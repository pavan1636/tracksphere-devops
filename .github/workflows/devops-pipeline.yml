name: TrackSphere.fit Infrastructure Validation Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# NOTE: Docker builds & security scans run in the application repo:
# https://github.com/pavan1636/TrackSphere.fit/actions

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Terraform Validation
  # ─────────────────────────────────────────────────────
  validate-terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        working-directory: ./terraform
        run: |
          terraform fmt -check -recursive || echo "⚠️  Formatting issues found (non-blocking)"

      - name: Terraform Init (no backend)
        working-directory: ./terraform
        run: |
          terraform init -backend=false
          echo "✅ Terraform init passed."

      - name: Terraform Validate
        working-directory: ./terraform
        run: |
          terraform validate
          echo "✅ Terraform configuration is valid."

  # ─────────────────────────────────────────────────────
  # Job 2: Helm Chart Linting
  # ─────────────────────────────────────────────────────
  validate-helm:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Helm Lint — Backend Chart
        run: |
          helm lint ./k8s/tracksphere-backend
          echo "✅ Backend Helm chart is valid."

      - name: Helm Lint — Frontend Chart
        run: |
          helm lint ./k8s/tracksphere-frontend
          echo "✅ Frontend Helm chart is valid."

  # ─────────────────────────────────────────────────────
  # Job 3: ArgoCD & K8s YAML Validation
  # ─────────────────────────────────────────────────────
  validate-manifests:
    name: Validate YAML Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate ArgoCD & K8s YAML Syntax
        run: |
          python3 -c "
          import yaml, sys, glob, os

          patterns = [
              'argocd/**/*.yaml', 'argocd/**/*.yml',
              'k8s/**/*.yaml',    'k8s/**/*.yml',
          ]
          files = []
          for p in patterns:
              files.extend(glob.glob(p, recursive=True))

          errors = []
          for f in sorted(set(files)):
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'✅ {f}')
              except Exception as e:
                  errors.append(f'❌ {f}: {e}')

          if errors:
              print()
              [print(e) for e in errors]
              sys.exit(1)
          print(f'')
          print(f'✅ All {len(set(files))} YAML manifests passed validation.')
          "
