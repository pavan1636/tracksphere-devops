name: TrackSphere.fit Infrastructure Validation Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# NOTE: Docker builds & security scans run in the application repo:
# https://github.com/pavan1636/TrackSphere.fit/actions

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Terraform Validation
  # ─────────────────────────────────────────────────────
  validate-terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        working-directory: ./terraform
        run: |
          terraform fmt -check -recursive || echo "⚠️  Formatting issues found (non-blocking)"

      - name: Terraform Init (no backend)
        working-directory: ./terraform
        run: |
          terraform init -backend=false
          echo "✅ Terraform init passed."

      - name: Terraform Validate
        working-directory: ./terraform
        run: |
          terraform validate
          echo "✅ Terraform configuration is valid."

  # ─────────────────────────────────────────────────────
  # Job 2: Helm Chart Linting
  # ─────────────────────────────────────────────────────
  validate-helm:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Helm Lint — Backend Chart
        run: |
          helm lint ./k8s/tracksphere-backend
          echo "✅ Backend Helm chart is valid."

      - name: Helm Lint — Frontend Chart
        run: |
          helm lint ./k8s/tracksphere-frontend
          echo "✅ Frontend Helm chart is valid."

  # ─────────────────────────────────────────────────────
  # Job 3: ArgoCD & K8s YAML Validation
  # ─────────────────────────────────────────────────────
  validate-manifests:
    name: Validate YAML Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate ArgoCD Manifests (pure YAML — no Helm templates)
        run: |
          python3 -c "
          import yaml, sys, glob

          # Only validate ArgoCD directory — k8s/ contains Helm templates
          # which use {{ .Values.xxx }} syntax and are NOT pure YAML
          patterns = ['argocd/**/*.yaml', 'argocd/**/*.yml']
          files = []
          for p in patterns:
              files.extend(glob.glob(p, recursive=True))

          if not files:
              print('ℹ️  No ArgoCD YAML files found.')
              sys.exit(0)

          errors = []
          for f in sorted(set(files)):
              try:
                  with open(f) as fh:
                      list(yaml.safe_load_all(fh))  # handles multi-doc YAML with ---
                  print(f'✅ {f}')
              except Exception as e:
                  errors.append(f'❌ {f}: {e}')

          if errors:
              print()
              [print(e) for e in errors]
              sys.exit(1)
          print(f'')
          print(f'✅ All {len(set(files))} ArgoCD manifests passed YAML validation.')
          "

      - name: Helm Template Render — Backend (validates Helm syntax)
        run: |
          helm template tracksphere-backend ./k8s/tracksphere-backend > /dev/null
          echo "✅ Backend Helm chart renders cleanly."

      - name: Helm Template Render — Frontend (validates Helm syntax)
        run: |
          helm template tracksphere-frontend ./k8s/tracksphere-frontend > /dev/null
          echo "✅ Frontend Helm chart renders cleanly."
