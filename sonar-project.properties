# SonarQube Project Configuration
sonar.projectKey=tracksphere-devops-platform
sonar.projectName=TrackSphere - DevOps & Infrastructure

# Paths to the source code to scan (scanning Terraform and Kubernetes manifests for security issues)
sonar.sources=terraform,k8s,argocd

# Exclusions to prevent scanning of state files and documentation
sonar.exclusions=**/terraform.tfstate,**/terraform.tfstate.backup,terraform/.terraform/**,**/docs/**

# File encoding
sonar.sourceEncoding=UTF-8
